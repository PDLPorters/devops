name: Install GSL
runs:
  using: "composite"
  steps:
    - name: Install GSL (via apt-get)
      shell: bash
      if: runner.os == 'Linux'
      run: |
          echo "::group::Install GSL (via apt-get)"
          sudo apt-get -y update && sudo apt-get install --no-install-recommends -y libgsl0-dev
          echo "::endgroup::"
    - name: Install GSL (via brew)
      shell: bash
      if: runner.os == 'macOS'
      run: |
          echo "::group::Install GSL (via brew)"
          brew install gsl
          echo "::endgroup::"
